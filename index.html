<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For My Valentine</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Cormorant+Garamond:wght@300;400;600&family=Dancing+Script:wght@400;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Cormorant Garamond', serif;
      background-color: #0a0015;
    }
    h1, h2, h3 {
      font-family: 'Playfair Display', serif;
    }
    .font-dancing {
      font-family: 'Dancing Script', cursive;
    }
    .font-mono {
      font-family: 'Fira Code', monospace;
    }
    #particle-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }
  </style>
<script type="importmap">
{
  "imports": {
    "rxjs": "https://esm.sh/rxjs@^7.8.2?conditions=es2015",
    "rxjs/operators": "https://esm.sh/rxjs@^7.8.2/operators?conditions=es2015",
    "rxjs/ajax": "https://esm.sh/rxjs@^7.8.2/ajax?conditions=es2015",
    "rxjs/webSocket": "https://esm.sh/rxjs@^7.8.2/webSocket?conditions=es2015",
    "rxjs/testing": "https://esm.sh/rxjs@^7.8.2/testing?conditions=es2015",
    "rxjs/fetch": "https://esm.sh/rxjs@^7.8.2/fetch?conditions=es2015",
    "@google/genai": "https://esm.sh/@google/genai@^1.40.0?external=rxjs",
    "@angular/common": "https://esm.sh/@angular/common@^21.1.3?external=rxjs",
    "@angular/common/http": "https://esm.sh/@angular/common@^21.1.3/http?external=rxjs",
    "@angular/platform-browser": "https://esm.sh/@angular/platform-browser@^21.1.3?external=rxjs",
    "@angular/core": "https://esm.sh/@angular/core@^21.1.3?external=rxjs",
    "@angular/compiler": "https://esm.sh/@angular/compiler@^21.1.3?external=rxjs",
    "process/browser": "https://esm.sh/process@^0.11.10/browser?external=rxjs"
  }
}
</script>
<script>
    tailwind.config = {
      theme: {
        extend: {
          keyframes: {
            typing: {
              "from": { width: "0" },
              "to": { width: "100%" }
            },
            "blink-caret": {
              "from, to": { "border-color": "transparent" },
              "50%": { "border-color": "#ffc3a0" },
            },
            fadeInUp: {
              'from': { opacity: '0', transform: 'translateY(20px)' },
              'to': { opacity: '1', transform: 'translateY(0)' },
            },
            heartbeat: {
              '0%': { transform: 'scale(1)', opacity: '0.8' },
              '50%': { transform: 'scale(1.1)', opacity: '1' },
              '100%': { transform: 'scale(1)', opacity: '0.8' },
            },
            'background-pan': {
              '0%': { 'background-position': '0% center' },
              '100%': { 'background-position': '-200% center' },
            }
          },
          animation: {
            // Blink stops after a few times for a cleaner look
            'typing-name': 'typing 1.2s steps(6, end) forwards, blink-caret .75s 1.2s 4',
            'typing-short': 'typing 1.8s steps(14, end) forwards, blink-caret .75s 1.8s 4',
            'typing-medium': 'typing 2s steps(16, end) forwards, blink-caret .75s 2s 4',
            'typing-long': 'typing 3.5s steps(78, end) forwards, blink-caret .75s 3.5s 4',
            'fade-in-up': 'fadeInUp 0.8s ease-out forwards',
            'heartbeat': 'heartbeat 1.5s ease-in-out infinite',
            'background-pan': 'background-pan 3s linear infinite',
          }
        }
      }
    }
  </script>
</head>
<body class="text-stardust bg-deep-space antialiased">
  <app-root></app-root>
</body>
</html>
